# --- Site settings -----------------------------------------------------------
title: John Viljoen
tagline: PhD student, UC Berkeley
description: >-
  Personal site of John Viljoen — PhD student at UC Berkeley. Research,
  projects, and writing.
author: John Viljoen
url: "https://johnviljoen.github.io"
baseurl: ""
lang: en

# --- Contact / social (edit these) -------------------------------------------
email: john_viljoen@berkeley.edu
github_username: johnviljoen
linkedin_username: johnviljoen          # TODO: set your real LinkedIn handle
scholar_url: "https://scholar.google.com/citations?user=YOUR_ID"  # TODO

# --- Build --------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# jekyll-feed
feed:
  path: /feed.xml

# Collections / defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .sass-cache
  - .jekyll-cache
