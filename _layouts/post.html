---
layout: default
---
<article class="post">
  <h1>{{ page.title }}</h1>
  <div class="postmeta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
  </div>
  {{ content }}
  <p style="margin-top:2.5rem"><a class="back" href="{{ '/blog/' | relative_url }}">← back to blog</a></p>
</article>
